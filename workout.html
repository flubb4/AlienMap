<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TrackFit – Mein Trainingsplan</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #242433;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #43e97b;
    --text: #f0f0f5;
    --text2: #8888aa;
    --radius: 14px;
    --tab-h: 64px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100%; }
  #header { padding: 16px 20px 8px; background: var(--bg); position: sticky; top: 0; z-index: 10; }
  #header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  #header h1 span { color: var(--accent); }
  #main { flex: 1; overflow-y: auto; padding: 12px 16px calc(var(--tab-h) + 16px); }
  #tabs { position: fixed; bottom: 0; left: 0; right: 0; height: var(--tab-h); background: var(--surface); border-top: 1px solid #2a2a3a; display: flex; z-index: 20; padding-bottom: env(safe-area-inset-bottom); }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; font-size: 10px; color: var(--text2); transition: color .2s; }
  .tab svg { width: 22px; height: 22px; }
  .tab.active { color: var(--accent); }

  /* ── Pages ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── Cards ── */
  .card { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 12px; text-transform: uppercase; letter-spacing: .8px; color: var(--text2); margin-bottom: 10px; }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 18px; border-radius: 10px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: opacity .15s, transform .1s; }
  .btn:active { transform: scale(.97); opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-success { background: var(--green); color: #111; }
  .btn-danger { background: #ff4466; color: #fff; }
  .btn-ghost { background: var(--surface2); color: var(--text); }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
  .btn-full { width: 100%; }

  /* ── Forms ── */
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .field input, .field select, .field textarea {
    width: 100%; background: var(--surface2); border: 1px solid #33334a; border-radius: 10px;
    color: var(--text); font-size: 15px; padding: 10px 12px; outline: none;
    -webkit-appearance: none; appearance: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field select option { background: var(--surface2); }
  .field textarea { resize: vertical; min-height: 70px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  /* ── Exercise list ── */
  .ex-card { background: var(--surface); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
  .ex-img { width: 56px; height: 56px; border-radius: 10px; object-fit: cover; background: var(--surface2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; overflow: hidden; }
  .ex-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
  .ex-info { flex: 1; min-width: 0; }
  .ex-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ex-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .ex-actions { display: flex; gap: 6px; flex-shrink: 0; }

  /* ── Log list ── */
  .log-entry { background: var(--surface); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .log-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .log-info { flex: 1; }
  .log-name { font-weight: 600; font-size: 14px; }
  .log-detail { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .log-weight { font-size: 18px; font-weight: 700; color: var(--green); flex-shrink: 0; }

  /* ── Dashboard stats ── */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat-box { background: var(--surface); border-radius: var(--radius); padding: 14px; }
  .stat-val { font-size: 26px; font-weight: 700; }
  .stat-label { font-size: 11px; color: var(--text2); margin-top: 4px; }
  .stat-box.accent { background: linear-gradient(135deg, #6c63ff44, #6c63ff22); border: 1px solid #6c63ff55; }
  .stat-box.green { background: linear-gradient(135deg, #43e97b33, #43e97b11); border: 1px solid #43e97b44; }

  /* ── Chart container ── */
  .chart-wrap { position: relative; width: 100%; height: 200px; }

  /* ── Modal ── */
  #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: flex-end; }
  #modal-overlay.open { display: flex; }
  #modal { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; padding: 20px 16px 32px; width: 100%; max-height: 92vh; overflow-y: auto; }
  #modal-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; }

  /* ── Badge ── */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; background: var(--surface2); color: var(--text2); }
  .badge.muscle { background: #6c63ff22; color: var(--accent); }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 40px 20px; color: var(--text2); }
  .empty svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: .4; }
  .empty p { font-size: 14px; }

  /* ── Section header ── */
  .section-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .section-hd h2 { font-size: 16px; font-weight: 700; }

  /* ── Muscle group filter ── */
  .filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 4px; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip { flex-shrink: 0; padding: 5px 12px; border-radius: 20px; background: var(--surface2); color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: .15s; }
  .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── Image upload preview ── */
  .img-preview { width: 100%; height: 140px; border-radius: 10px; background: var(--surface2); border: 2px dashed #33334a; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; overflow: hidden; position: relative; }
  .img-preview img { width: 100%; height: 100%; object-fit: cover; }
  .img-preview span { font-size: 12px; color: var(--text2); }
  .img-preview input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  /* ── PR badge ── */
  .pr-badge { background: #ff656422; border: 1px solid #ff656466; color: #ff9a9a; border-radius: 6px; font-size: 11px; padding: 2px 7px; font-weight: 700; }

  /* ── Scrollbar ── */
  #main::-webkit-scrollbar { width: 0; }

  /* ── Progress bar ── */
  .prog-bar-wrap { background: var(--surface2); border-radius: 4px; height: 6px; margin-top: 6px; }
  .prog-bar { height: 6px; border-radius: 4px; background: linear-gradient(90deg, var(--accent), #a29bfe); transition: width .4s; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>Track<span>Fit</span></h1>
  </div>

  <div id="main">
    <!-- ── DASHBOARD ── -->
    <div id="page-dashboard" class="page active">
      <div class="stat-grid">
        <div class="stat-box accent">
          <div class="stat-val" id="stat-total">0</div>
          <div class="stat-label">Einheiten gesamt</div>
        </div>
        <div class="stat-box green">
          <div class="stat-val" id="stat-week">0</div>
          <div class="stat-label">Diese Woche</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="stat-exercises">0</div>
          <div class="stat-label">Übungen</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="stat-maxweight">–</div>
          <div class="stat-label">Max. Gewicht (kg)</div>
        </div>
      </div>

      <div class="card" id="chart-section" style="display:none">
        <div class="section-hd">
          <h2>Fortschritt</h2>
          <select id="chart-exercise-sel" style="background:var(--surface2);color:var(--text);border:none;border-radius:8px;padding:4px 8px;font-size:12px;"></select>
        </div>
        <div class="chart-wrap"><canvas id="progressChart"></canvas></div>
      </div>

      <div class="section-hd" style="margin-top:8px">
        <h2>Letzte Eintr&auml;ge</h2>
      </div>
      <div id="recent-list">
        <div class="empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          <p>Noch kein Training geloggt</p>
        </div>
      </div>
    </div>

    <!-- ── LOG ── -->
    <div id="page-log" class="page">
      <div class="section-hd">
        <h2>Training loggen</h2>
      </div>

      <div class="card">
        <div class="field">
          <label>Datum</label>
          <input type="date" id="log-date">
        </div>
        <div class="field">
          <label>&Uuml;bung</label>
          <select id="log-exercise">
            <option value="">– Übung wählen –</option>
          </select>
        </div>
        <div class="row3">
          <div class="field">
            <label>Gewicht (kg)</label>
            <input type="number" id="log-weight" placeholder="0" min="0" step="0.5">
          </div>
          <div class="field">
            <label>S&auml;tze</label>
            <input type="number" id="log-sets" placeholder="3" min="1" max="20">
          </div>
          <div class="field">
            <label>Wdh.</label>
            <input type="number" id="log-reps" placeholder="10" min="1" max="100">
          </div>
        </div>
        <div class="field">
          <label>Notiz (optional)</label>
          <textarea id="log-note" placeholder="z.B. Form war gut, nächstes Mal +2.5kg"></textarea>
        </div>
        <button class="btn btn-success btn-full" onclick="saveLog()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Eintrag speichern
        </button>
      </div>

      <div class="section-hd" style="margin-top:16px">
        <h2>Verlauf</h2>
        <select id="history-filter" onchange="renderHistory()" style="background:var(--surface2);color:var(--text);border:none;border-radius:8px;padding:4px 8px;font-size:12px;">
          <option value="">Alle</option>
        </select>
      </div>
      <div id="history-list"></div>
    </div>

    <!-- ── EXERCISES ── -->
    <div id="page-exercises" class="page">
      <div class="section-hd">
        <h2>&Uuml;bungen</h2>
        <button class="btn btn-primary btn-sm" onclick="openAddExercise()">+ Neu</button>
      </div>
      <div class="filter-row" id="muscle-filter">
        <div class="filter-chip active" data-muscle="all" onclick="filterMuscle(this)">Alle</div>
        <div class="filter-chip" data-muscle="Brust" onclick="filterMuscle(this)">Brust</div>
        <div class="filter-chip" data-muscle="Rücken" onclick="filterMuscle(this)">R&uuml;cken</div>
        <div class="filter-chip" data-muscle="Schultern" onclick="filterMuscle(this)">Schultern</div>
        <div class="filter-chip" data-muscle="Arme" onclick="filterMuscle(this)">Arme</div>
        <div class="filter-chip" data-muscle="Beine" onclick="filterMuscle(this)">Beine</div>
        <div class="filter-chip" data-muscle="Core" onclick="filterMuscle(this)">Core</div>
        <div class="filter-chip" data-muscle="Cardio" onclick="filterMuscle(this)">Cardio</div>
      </div>
      <div id="exercise-list"></div>
    </div>
  </div>

  <!-- ── TABS ── -->
  <div id="tabs">
    <div class="tab active" onclick="showPage('dashboard',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
      Dashboard
    </div>
    <div class="tab" onclick="showPage('log',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="12" x2="15" y2="14"/>
      </svg>
      Loggen
    </div>
    <div class="tab" onclick="showPage('exercises',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M6.5 6.5h11M6.5 12h11M6.5 17.5h11"/><circle cx="3.5" cy="6.5" r="1"/><circle cx="3.5" cy="12" r="1"/><circle cx="3.5" cy="17.5" r="1"/>
      </svg>
      &Uuml;bungen
    </div>
  </div>
</div>

<!-- ── MODAL ── -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <div id="modal-title">Übung hinzufügen</div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ════════════════════════════════
//  DATA LAYER
// ════════════════════════════════
const DB = {
  get exercises() { return JSON.parse(localStorage.getItem('tf_exercises') || '[]'); },
  set exercises(v) { localStorage.setItem('tf_exercises', JSON.stringify(v)); },
  get logs() { return JSON.parse(localStorage.getItem('tf_logs') || '[]'); },
  set logs(v) { localStorage.setItem('tf_logs', JSON.stringify(v)); },
};

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ════════════════════════════════
//  NAV
// ════════════════════════════════
function showPage(name, tabEl) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  tabEl.classList.add('active');
  if (name === 'dashboard') renderDashboard();
  if (name === 'log') { initLogForm(); renderHistory(); }
  if (name === 'exercises') renderExercises();
}

// ════════════════════════════════
//  EXERCISES PAGE
// ════════════════════════════════
let muscleFilter = 'all';

function filterMuscle(el) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  muscleFilter = el.dataset.muscle;
  renderExercises();
}

function renderExercises() {
  const list = document.getElementById('exercise-list');
  let exs = DB.exercises;
  if (muscleFilter !== 'all') exs = exs.filter(e => e.muscle === muscleFilter);

  if (!exs.length) {
    list.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 4v16m8-8H4"/></svg>
      <p>Noch keine Übungen. Tippe "+ Neu".</p></div>`;
    return;
  }

  list.innerHTML = exs.map(ex => {
    const logs = DB.logs.filter(l => l.exId === ex.id);
    const maxW = logs.length ? Math.max(...logs.map(l => parseFloat(l.weight)||0)) : null;
    const imgHtml = ex.image
      ? `<img src="${ex.image}" alt="${ex.name}">`
      : `<span>${ex.emoji || '🏋️'}</span>`;
    return `<div class="ex-card">
      <div class="ex-img">${imgHtml}</div>
      <div class="ex-info">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-meta">
          <span class="badge muscle">${ex.muscle}</span>
          ${maxW ? `&nbsp;<span class="badge">Max: ${maxW} kg</span>` : ''}
          &nbsp;<span class="badge">${logs.length}× geloggt</span>
        </div>
      </div>
      <div class="ex-actions">
        <button class="btn btn-ghost btn-sm" onclick="openEditExercise('${ex.id}')">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteExercise('${ex.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function openAddExercise() {
  document.getElementById('modal-title').textContent = 'Übung hinzufügen';
  document.getElementById('modal-body').innerHTML = exerciseFormHtml(null);
  document.getElementById('modal-overlay').classList.add('open');
}

function openEditExercise(id) {
  const ex = DB.exercises.find(e => e.id === id);
  if (!ex) return;
  document.getElementById('modal-title').textContent = 'Übung bearbeiten';
  document.getElementById('modal-body').innerHTML = exerciseFormHtml(ex);
  document.getElementById('modal-overlay').classList.add('open');
  if (ex.image) {
    const prev = document.getElementById('img-preview-el');
    prev.innerHTML = `<img src="${ex.image}"><input type="file" accept="image/*" onchange="previewImg(this)">`;
  }
}

function exerciseFormHtml(ex) {
  const muscles = ['Brust','Rücken','Schultern','Arme','Beine','Core','Cardio','Sonstige'];
  const emojis = ['🏋️','💪','🦵','🏃','🚴','🤸','🧘','⚡'];
  return `
    <div class="field"><label>Name der Übung</label>
      <input id="ex-name" type="text" placeholder="z.B. Bankdrücken" value="${ex ? ex.name : ''}"></div>
    <div class="row2">
      <div class="field"><label>Muskelgruppe</label>
        <select id="ex-muscle">
          ${muscles.map(m=>`<option value="${m}" ${ex&&ex.muscle===m?'selected':''}>${m}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Emoji (ohne Bild)</label>
        <select id="ex-emoji">
          ${emojis.map(e=>`<option value="${e}" ${ex&&ex.emoji===e?'selected':''}>${e}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="field"><label>Maschinenbild (optional)</label>
      <div class="img-preview" id="img-preview-el" onclick="this.querySelector('input').click()">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#8888aa" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span>Foto auswählen</span>
        <input type="file" accept="image/*" onchange="previewImg(this)" style="position:absolute;inset:0;opacity:0;cursor:pointer;">
      </div>
    </div>
    <div class="field"><label>Notizen / Beschreibung</label>
      <textarea id="ex-notes" placeholder="z.B. Schulterbreit greifen, langsam absenken">${ex ? ex.notes||'' : ''}</textarea>
    </div>
    <input type="hidden" id="ex-id" value="${ex ? ex.id : ''}">
    <button class="btn btn-primary btn-full" onclick="saveExercise()" style="margin-top:4px">Speichern</button>
  `;
}

let pendingImage = null;

function previewImg(input) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    pendingImage = e.target.result;
    const prev = document.getElementById('img-preview-el');
    prev.innerHTML = `<img src="${pendingImage}" style="width:100%;height:100%;object-fit:cover;border-radius:10px;">
      <input type="file" accept="image/*" onchange="previewImg(this)" style="position:absolute;inset:0;opacity:0;cursor:pointer;">`;
  };
  reader.readAsDataURL(input.files[0]);
}

function saveExercise() {
  const name = document.getElementById('ex-name').value.trim();
  if (!name) { alert('Bitte einen Namen eingeben.'); return; }
  const exs = DB.exercises;
  const existingId = document.getElementById('ex-id').value;
  const data = {
    id: existingId || uid(),
    name,
    muscle: document.getElementById('ex-muscle').value,
    emoji: document.getElementById('ex-emoji').value,
    notes: document.getElementById('ex-notes').value.trim(),
    image: pendingImage || (existingId ? (exs.find(e=>e.id===existingId)||{}).image : null),
  };
  if (existingId) {
    DB.exercises = exs.map(e => e.id === existingId ? data : e);
  } else {
    DB.exercises = [...exs, data];
  }
  pendingImage = null;
  closeModal();
  renderExercises();
}

function deleteExercise(id) {
  if (!confirm('Übung löschen? Alle Logs bleiben erhalten.')) return;
  DB.exercises = DB.exercises.filter(e => e.id !== id);
  renderExercises();
}

// ════════════════════════════════
//  LOG PAGE
// ════════════════════════════════
function initLogForm() {
  const dateEl = document.getElementById('log-date');
  if (!dateEl.value) dateEl.value = new Date().toISOString().slice(0, 10);

  const sel = document.getElementById('log-exercise');
  const hf = document.getElementById('history-filter');
  const exs = DB.exercises;
  const opts = exs.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
  sel.innerHTML = '<option value="">– Übung wählen –</option>' + opts;
  hf.innerHTML = '<option value="">Alle</option>' + opts;
}

function saveLog() {
  const exId = document.getElementById('log-exercise').value;
  const weight = document.getElementById('log-weight').value;
  const sets = document.getElementById('log-sets').value;
  const reps = document.getElementById('log-reps').value;
  const date = document.getElementById('log-date').value;
  if (!exId) { alert('Bitte eine Übung wählen.'); return; }
  if (!weight) { alert('Bitte ein Gewicht eingeben.'); return; }
  if (!date) { alert('Bitte ein Datum wählen.'); return; }

  const log = {
    id: uid(),
    exId,
    weight: parseFloat(weight),
    sets: parseInt(sets) || 1,
    reps: parseInt(reps) || 1,
    date,
    note: document.getElementById('log-note').value.trim(),
    ts: Date.now(),
  };

  const logs = DB.logs;
  // Check PR
  const prevMax = logs.filter(l=>l.exId===exId).reduce((m,l)=>Math.max(m,l.weight||0),0);
  DB.logs = [...logs, log];

  // Reset form
  document.getElementById('log-weight').value = '';
  document.getElementById('log-sets').value = '';
  document.getElementById('log-reps').value = '';
  document.getElementById('log-note').value = '';
  document.getElementById('log-exercise').value = '';

  renderHistory();

  if (log.weight > prevMax && prevMax > 0) {
    showToast(`🏆 Neuer Rekord! ${log.weight} kg`);
  } else {
    showToast('✅ Eingetragen!');
  }
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const filterEx = document.getElementById('history-filter').value;
  let logs = [...DB.logs].sort((a,b) => b.date.localeCompare(a.date) || b.ts - a.ts);
  if (filterEx) logs = logs.filter(l => l.exId === filterEx);

  if (!logs.length) {
    list.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><p>Noch keine Einträge.</p></div>`;
    return;
  }

  const exMap = Object.fromEntries(DB.exercises.map(e => [e.id, e]));
  list.innerHTML = logs.map(l => {
    const ex = exMap[l.exId];
    const exName = ex ? ex.name : '(gelöscht)';
    const prLogs = DB.logs.filter(x => x.exId === l.exId && x.date <= l.date && x.ts < l.ts);
    const prevMax = prLogs.reduce((m,x) => Math.max(m, x.weight||0), 0);
    const isPR = l.weight > prevMax && prevMax > 0;
    return `<div class="log-entry">
      <div class="log-dot"></div>
      <div class="log-info">
        <div class="log-name">${exName} ${isPR ? '<span class="pr-badge">PR</span>' : ''}</div>
        <div class="log-detail">${formatDate(l.date)} &bull; ${l.sets} Sätze × ${l.reps} Wdh.${l.note ? ' &bull; ' + l.note : ''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="log-weight">${l.weight}<small style="font-size:11px;color:var(--text2)"> kg</small></div>
        <button class="btn btn-danger btn-sm" onclick="deleteLog('${l.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function deleteLog(id) {
  if (!confirm('Eintrag löschen?')) return;
  DB.logs = DB.logs.filter(l => l.id !== id);
  renderHistory();
  renderDashboard();
}

// ════════════════════════════════
//  DASHBOARD
// ════════════════════════════════
let progressChart = null;

function renderDashboard() {
  const logs = DB.logs;
  const exs = DB.exercises;

  // Stats
  document.getElementById('stat-total').textContent = logs.length;
  const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
  const wStr = weekAgo.toISOString().slice(0,10);
  document.getElementById('stat-week').textContent = logs.filter(l => l.date >= wStr).length;
  document.getElementById('stat-exercises').textContent = exs.length;
  const maxW = logs.reduce((m,l) => Math.max(m, l.weight||0), 0);
  document.getElementById('stat-maxweight').textContent = maxW || '–';

  // Recent
  const recent = [...logs].sort((a,b) => b.date.localeCompare(a.date)||b.ts-a.ts).slice(0,8);
  const exMap = Object.fromEntries(exs.map(e=>[e.id,e]));
  const recentEl = document.getElementById('recent-list');
  if (!recent.length) {
    recentEl.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><p>Noch kein Training geloggt</p></div>`;
  } else {
    recentEl.innerHTML = recent.map(l => {
      const ex = exMap[l.exId];
      return `<div class="log-entry">
        <div class="log-dot" style="background:var(--accent)"></div>
        <div class="log-info">
          <div class="log-name">${ex ? ex.name : '(gelöscht)'}</div>
          <div class="log-detail">${formatDate(l.date)} &bull; ${l.sets}×${l.reps} Wdh.</div>
        </div>
        <div class="log-weight">${l.weight}<small style="font-size:11px;color:var(--text2)"> kg</small></div>
      </div>`;
    }).join('');
  }

  // Chart
  const chartSection = document.getElementById('chart-section');
  const sel = document.getElementById('chart-exercise-sel');

  if (exs.length && logs.length) {
    chartSection.style.display = '';
    // Populate selector with exercises that have logs
    const loggedExIds = [...new Set(logs.map(l=>l.exId))];
    const loggedExs = exs.filter(e => loggedExIds.includes(e.id));
    const prev = sel.value;
    sel.innerHTML = loggedExs.map(e => `<option value="${e.id}" ${e.id===prev?'selected':''}>${e.name}</option>`).join('');
    if (!sel.value && loggedExs.length) sel.value = loggedExs[0].id;
    sel.onchange = () => drawChart(sel.value);
    drawChart(sel.value);
  } else {
    chartSection.style.display = 'none';
  }
}

function drawChart(exId) {
  const logs = DB.logs.filter(l => l.exId === exId)
    .sort((a,b) => a.date.localeCompare(b.date));

  const labels = logs.map(l => formatDate(l.date, true));
  const data = logs.map(l => l.weight);

  const ctx = document.getElementById('progressChart').getContext('2d');
  if (progressChart) progressChart.destroy();

  progressChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: '#6c63ff',
        backgroundColor: 'rgba(108,99,255,0.15)',
        fill: true,
        tension: 0.35,
        pointBackgroundColor: '#6c63ff',
        pointRadius: 4,
        pointHoverRadius: 6,
        borderWidth: 2.5,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.parsed.y} kg`,
          },
          backgroundColor: '#1a1a24',
          titleColor: '#f0f0f5',
          bodyColor: '#8888aa',
          borderColor: '#33334a',
          borderWidth: 1,
        }
      },
      scales: {
        x: {
          ticks: { color: '#8888aa', font: { size: 10 }, maxTicksLimit: 6 },
          grid: { color: '#1e1e2e' },
        },
        y: {
          ticks: { color: '#8888aa', font: { size: 10 }, callback: v => v + ' kg' },
          grid: { color: '#1e1e2e' },
        }
      }
    }
  });
}

// ════════════════════════════════
//  MODAL
// ════════════════════════════════
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  pendingImage = null;
}

// ════════════════════════════════
//  HELPERS
// ════════════════════════════════
function formatDate(str, short = false) {
  const [y, m, d] = str.split('-');
  if (short) return `${d}.${m}.`;
  return `${d}.${m}.${y}`;
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#6c63ff;color:#fff;padding:10px 20px;border-radius:30px;font-weight:600;font-size:14px;z-index:999;transition:opacity .3s;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._to);
  t._to = setTimeout(() => t.style.opacity = '0', 2200);
}

// ════════════════════════════════
//  INIT
// ════════════════════════════════
(function init() {
  // Seed a few example exercises if empty
  if (!DB.exercises.length) {
    DB.exercises = [
      { id: uid(), name: 'Bankdrücken', muscle: 'Brust', emoji: '🏋️', notes: '', image: null },
      { id: uid(), name: 'Kniebeugen', muscle: 'Beine', emoji: '🦵', notes: '', image: null },
      { id: uid(), name: 'Klimmzüge', muscle: 'Rücken', emoji: '💪', notes: '', image: null },
    ];
  }
  renderDashboard();
})();
</script>
